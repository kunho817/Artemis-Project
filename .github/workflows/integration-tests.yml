name: Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  integration:
    name: Integration Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: ['1.21', '1.22']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gopls universal-ctags

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install gopls universal-ctags

      - name: Install system dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install gopls

      - name: Download Go modules
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run integration tests
        env:
          ARTEMIS_CLAUDE_API_KEY: ${{ secrets.ARTEMIS_CLAUDE_API_KEY }}
          ARTEMIS_GEMINI_API_KEY: ${{ secrets.ARTEMIS_GEMINI_API_KEY }}
          ARTEMIS_GPT_API_KEY: ${{ secrets.ARTEMIS_GPT_API_KEY }}
        run: |
          go test -v -race -timeout 30m ./tests/integration/...

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-go${{ matrix.go-version }}
          path: |
            test-results/
            *.log

  e2e:
    name: E2E Pipeline Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gopls universal-ctags

      - name: Download Go modules
        run: go mod download

      - name: Run E2E tests
        env:
          ARTEMIS_CLAUDE_API_KEY: ${{ secrets.ARTEMIS_CLAUDE_API_KEY }}
        run: |
          go test -v -race -timeout 30m ./tests/integration/e2e/...

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            test-results/
            *.log

  tools:
    name: Tools Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gopls

      - name: Download Go modules
        run: go mod download

      - name: Run tools tests
        run: |
          go test -v -race -timeout 20m ./tests/integration/tools/...

      - name: Upload tools test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tools-test-results
          path: |
            test-results/
            *.log

  memory:
    name: Memory Persistence Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: artemis_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download Go modules
        run: go mod download

      - name: Run memory tests
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/artemis_test?sslmode=disable
        run: |
          go test -v -race -timeout 20m ./tests/integration/memory/...

      - name: Upload memory test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: memory-test-results
          path: |
            test-results/
            *.log

name: Visual Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight
  workflow_dispatch:  # Allow manual trigger

jobs:
  visual-regression:
    name: Visual Regression Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb screenshot-tools

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install imagemagick

      - name: Install system dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          # Windows screenshot tools are built-in

      - name: Download Go modules
        run: go mod download

      - name: Run visual regression tests
        env:
          ARTEMIS_CLAUDE_API_KEY: ${{ secrets.ARTEMIS_CLAUDE_API_KEY }}
          ARTEMIS_GPT_API_KEY: ${{ secrets.ARTEMIS_GPT_API_KEY }}
          ARTEMIS_GEMINI_API_KEY: ${{ secrets.ARTEMIS_GEMINI_API_KEY }}
          DISPLAY: :99  # For Xvfb on Ubuntu
        run: |
          # Start Xvfb on Ubuntu
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            Xvfb :99 -screen 0 1024x768x24 &
            sleep 2
          fi

          go test -v -timeout 30m ./tests/integration/visual/...

      - name: Upload diff images
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs-${{ matrix.os }}
          path: |
            tests/integration/visual/regression/diffs/
            **/diffs/*.png

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-results-${{ matrix.os }}
          path: |
            test-results/
            *.log

  vision-providers:
    name: Vision Provider Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download Go modules
        run: go mod download

      - name: Test Claude Vision
        env:
          ARTEMIS_CLAUDE_API_KEY: ${{ secrets.ARTEMIS_CLAUDE_API_KEY }}
        run: |
          go test -v -run TestClaudeVision ./tests/integration/visual/providers/...

      - name: Test GPT Vision
        env:
          ARTEMIS_GPT_API_KEY: ${{ secrets.ARTEMIS_GPT_API_KEY }}
        run: |
          go test -v -run TestGPTVision ./tests/integration/visual/providers/...

      - name: Test Gemini Vision
        env:
          ARTEMIS_GEMINI_API_KEY: ${{ secrets.ARTEMIS_GEMINI_API_KEY }}
        run: |
          go test -v -run TestGeminiVision ./tests/integration/visual/providers/...

      - name: Upload vision test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vision-provider-results
          path: |
            test-results/
            *.log

  spatial-reasoning:
    name: Spatial Reasoning Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download Go modules
        run: go mod download

      - name: Run spatial reasoning tests
        env:
          ARTEMIS_CLAUDE_API_KEY: ${{ secrets.ARTEMIS_CLAUDE_API_KEY }}
        run: |
          go test -v -run TestSpatial ./tests/integration/visual/prompts/...

      - name: Upload spatial test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spatial-test-results
          path: |
            test-results/
            *.log

  yolo-detection:
    name: YOLO Detection Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Python for YOLO
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install ultralytics torch torchvision

      - name: Download Go modules
        run: go mod download

      - name: Run YOLO detection tests
        run: |
          go test -v -run TestYOLO ./internal/vision/...

      - name: Upload YOLO test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yolo-test-results
          path: |
            test-results/
            *.log
            **/yolo_*.png

  layout-validation:
    name: Layout Validation Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install ultralytics

      - name: Download Go modules
        run: go mod download

      - name: Run layout validation tests
        env:
          ARTEMIS_CLAUDE_API_KEY: ${{ secrets.ARTEMIS_CLAUDE_API_KEY }}
        run: |
          go test -v -run TestLayoutValidation ./internal/vision/...

      - name: Upload layout validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: layout-validation-results
          path: |
            test-results/
            *.log
            **/layout_*.json

  golden-master:
    name: Golden Master Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download Go modules
        run: go mod download

      - name: Run golden master tests
        run: |
          go test -v -run TestGoldenMaster ./tests/integration/visual/regression/...

      - name: Upload golden master results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-master-results
          path: |
            test-results/
            *.log
            tests/integration/visual/regression/golden/
            tests/integration/visual/regression/diffs/
